<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MixIt Project | Douglas Ede</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="project-pages.css" />
  </head>
  <body>
    <header class="project-header container">
      <a class="back-link" href="index.html#work">← Back to Projects</a>
    </header>

    <main>
      <section class="project-hero container">
        <h1>MixIt - Concretti Designs</h1>
        <p>
          Internal tooling suite that accelerated mix planning, job-volume
          calculations, and recipe management for a luxury concrete production
          operation.
        </p>
      </section>

      <section class="gallery-shell container">
        <div class="project-gallery" aria-label="MixIt project gallery">
          <p class="gallery-intro">
            MixIt interface snapshots organized by calculators and design tools.
          </p>
          <div class="gallery-grid">
            <figure class="gallery-item wide">
              <img src="images/mixItBCPrime.jpg" alt="MixIt batch calculator primary view" />
              <figcaption>Batch calculator dashboard for fast production planning.</figcaption>
            </figure>
            <figure class="gallery-item">
              <img src="images/mixItBC1.jpg" alt="MixIt batch calculator input panel" />
              <figcaption>Structured input flow reduced manual calculation errors.</figcaption>
            </figure>
            <figure class="gallery-item">
              <img src="images/mixItBC2.jpg" alt="MixIt calculator result and totals" />
              <figcaption>Real-time totals gave operators immediate material clarity.</figcaption>
            </figure>
            <figure class="gallery-item">
              <img src="images/mixItBC3.jpg" alt="MixIt batch calculator alternate mode" />
              <figcaption>Alternate workflow mode for variable batch requirements.</figcaption>
            </figure>
            <figure class="gallery-item wide">
              <img src="images/mixItJobsPrime.jpg" alt="MixIt job volume calculator" />
              <figcaption>Job volume calculator helped forecast total job material demand.</figcaption>
            </figure>
            <figure class="gallery-item">
              <img src="images/mixItMDPrime.jpg" alt="MixIt mix design manager main screen" />
              <figcaption>Mix design manager for saved recipes and repeatable outcomes.</figcaption>
            </figure>
            <figure class="gallery-item">
              <img src="images/mixItMD1.jpg" alt="MixIt design manager details" />
              <figcaption>Detailed recipe controls supported consistent production standards.</figcaption>
            </figure>
            <figure class="gallery-item">
              <img src="images/mixItVCPrime.jpg" alt="MixIt volume calculator primary screen" />
              <figcaption>Volume calculator streamlined ordering and delivery preparation.</figcaption>
            </figure>
            <figure class="gallery-item">
              <img src="images/mixItVC1.jpg" alt="MixIt volume calculator data form" />
              <figcaption>Simple data entry reduced onboarding friction for teams.</figcaption>
            </figure>
            <figure class="gallery-item wide">
              <img src="images/mixItVCTotal.jpg" alt="MixIt volume calculator final totals" />
              <figcaption>Final totals view made order confirmation fast and reliable.</figcaption>
            </figure>
            <figure class="gallery-item full tall">
              <img src="images/mixItVBPenUlt.jpg" alt="MixIt interface overview" />
              <figcaption>System-wide interface consistency improved daily operator speed.</figcaption>
            </figure>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
